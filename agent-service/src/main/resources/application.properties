quarkus.langchain4j.response-schema=false

quarkus.langchain4j.chat-model.provider=openai
quarkus.langchain4j.openai.routing.log-requests=true
quarkus.langchain4j.openai.routing.log-responses=true
quarkus.langchain4j.openai.routing.chat-model.temperature=0.1
quarkus.langchain4j.openai.routing.timeout=180s

quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.mapping.format.global=ignore

%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.hibernate-orm.schema-management.strategy=validate
%dev.quarkus.hibernate-orm.log.sql=true

quarkus.package.jar.decompiler.enabled=true